name: Release

# Tag-driven release: build + publish with GoReleaser, then attach a GitHub
# build-provenance attestation so downloads can be verified with
#   gh attestation verify <archive> --repo takahira/agentdone
#
# Every third-party action here is pinned to a commit SHA: this workflow holds
# id-token/attestations/contents:write, so a hijacked action tag could ship a
# provenance-signed malicious binary. ci.yml pins the same actions to the same
# SHAs — bump both together (the comments name the release).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write     # create the GitHub release and upload assets
  id-token: write     # OIDC identity for Sigstore-backed provenance
  attestations: write # write the build-provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # GoReleaser needs full history/tags for the changelog
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      # Never sign and publish a build whose tests don't pass. CI runs on push
      # too, but a tag can be cut from any commit — gate here, where it counts.
      - run: go test ./...
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attest build provenance for the release archives
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
